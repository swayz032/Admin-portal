name: Admin Portal CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'types/**'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'src/**'

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint . 2>&1 | tail -20 || true

      - name: Type check
        run: npx tsc --noEmit 2>&1 | tail -20 || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run --reporter=verbose 2>&1 | tail -30

  build:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx vite build 2>&1 | tail -10
        env:
          VITE_SUPABASE_URL: https://qtuehjqlcmfcascqjjhc.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-for-ci

  type-drift:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check type drift
        run: |
          if [ -f "types/supabase.generated.ts" ]; then
            echo "Supabase types present — checking for uncommitted drift..."
            if ! git diff --quiet types/supabase.generated.ts 2>/dev/null; then
              echo "DRIFT: supabase.generated.ts has uncommitted changes"
              exit 1
            fi
            echo "No drift detected."
          fi
